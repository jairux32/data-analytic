<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Socioambiental Cacaotero - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cacao: {
                            50: '#f7f5f0',
                            100: '#ede8db',
                            200: '#d9d0b5',
                            300: '#c0b48a',
                            400: '#a89860',
                            500: '#8f7c36',
                            600: '#725e2c',
                            700: '#554922',
                            800: '#393518',
                            900: '#1c190c',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-cacao-800">Diagnóstico Socioambiental</h1>
            <p class="text-gray-600 mt-2">Productores de Cacao - Guayas & Los Ríos</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" name="email" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-cacao-500 focus:border-cacao-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" name="password" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-cacao-500 focus:border-cacao-500">
            </div>

            <div id="errorMessage" class="hidden text-red-600 text-sm text-center"></div>

            <button type="submit"
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-cacao-600 hover:bg-cacao-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cacao-500">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-500">
                ¿Necesita ayuda? Contacte al administrador
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (!response.ok) {
                    const data = await response.json();
                    errorDiv.textContent = data.detail || 'Error de autenticación';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                // Guardar tokens en localStorage como backup
                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);

                // Redirigir al dashboard
                window.location.href = '/dashboard';

            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
